name: Build Morning Dispatch

# ---------------------------------------------------------------------------
# Schedule notes (GitHub cron is always UTC and does NOT observe DST):
#
#   19:20 UTC  ->  6:20am AEDT (summer)   |  5:20am AEST (winter)
#   20:20 UTC  ->  7:20am AEDT (summer)   |  6:20am AEST (winter)
#
# Running BOTH means the briefing is always freshly built and live before
# 7:00am local in both halves of the year:
#   - Summer (AEDT): the 19:20 run lands it by ~6:20am, using futures.
#   - Winter (AEST): the 20:20 run lands it by ~6:20am, *after* the US cash
#     close (06:00 AEST), so it captures the closing prints.
# Each run fully overwrites the page; running twice is harmless + resilient.
# ---------------------------------------------------------------------------
on:
  schedule:
    - cron: "20 19 * * *"
    - cron: "20 20 * * *"
  workflow_dispatch: {}          # lets you trigger a build by hand any time

permissions:
  contents: write                # to persist the dated archive back to the repo
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate the briefing
        env:
          # Optional: add this in repo Settings > Secrets > Actions to enable
          # the Claude synthesis layer. Without it the build still works.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 generate.py --out public

      - name: Persist dated archive
        continue-on-error: true        # never let archiving break the deploy
        run: |
          git config user.name "dispatch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/archive
          git commit -m "archive: $(date -u +%F)" || echo "nothing new to archive"
          git push || echo "push skipped"

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
